<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUMON AI - Grading Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background-color: #0a0a0a; color: #f4f4f5; overflow-x: hidden; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .emerald-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        #videoStream { width: 100%; height: 100%; object-fit: cover; }
        .loader { border: 3px solid rgba(16, 185, 129, 0.1); border-top: 3px solid #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen selection:bg-emerald-500/30">

    <!-- Header -->
    <header class="border-b border-white/5 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <i class="fa-solid fa- brain text-black text-sm"></i>
                </div>
                <h1 class="font-bold tracking-tight text-lg uppercase">KUMON<span class="text-emerald-500">AI</span></h1>
            </div>
            <button id="toggleHistory" class="text-xs font-mono uppercase tracking-widest text-zinc-500 hover:text-emerald-400 transition-colors flex items-center gap-2">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>History</span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-8">
        
        <!-- Main Interface -->
        <div id="mainView" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Left Column: Camera/Capture -->
            <section class="space-y-6">
                <div class="relative aspect-[3/4] bg-zinc-900 rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl group">
                    
                    <!-- Live Camera Feed -->
                    <div id="cameraContainer" class="h-full w-full relative">
                        <video id="videoStream" autoplay playsinline muted class="grayscale-[0.1] contrast-[1.05]"></video>
                        
                        <!-- Camera Overlay UI -->
                        <div class="absolute inset-0 pointer-events-none border-[30px] border-black/20">
                            <div class="h-full w-full border border-emerald-500/30 rounded-xl relative">
                                <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-emerald-500"></div>
                                <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-emerald-500"></div>
                                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-emerald-500"></div>
                                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-emerald-500"></div>
                            </div>
                        </div>

                        <!-- Shutter Button -->
                        <div class="absolute bottom-8 left-0 right-0 flex justify-center pointer-events-auto">
                            <button id="captureBtn" class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl hover:scale-105 active:scale-90 transition-all border-8 border-zinc-800">
                                <div class="w-12 h-12 bg-zinc-900 rounded-full flex items-center justify-center group-hover:bg-emerald-500 transition-colors">
                                    <i class="fa-solid fa-camera text-white"></i>
                                </div>
                            </button>
                        </div>
                    </div>

                    <!-- Preview/Review Layer -->
                    <div id="previewLayer" class="hidden absolute inset-0 bg-black">
                        <img id="previewImage" src="" class="h-full w-full object-contain">
                        <div class="absolute top-6 right-6 flex gap-2">
                            <button id="resetBtn" class="p-4 bg-black/60 backdrop-blur-md rounded-2xl text-white hover:bg-rose-500 transition-colors border border-white/10">
                                <i class="fa-solid fa-rotate-left"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Secondary Actions -->
                <div class="flex gap-4">
                    <label class="flex-1 bg-zinc-900 border border-white/5 p-4 rounded-2xl flex items-center justify-center gap-3 cursor-pointer hover:bg-zinc-800 transition-all active:scale-95">
                        <i class="fa-solid fa-upload text-emerald-500"></i>
                        <span class="text-sm font-bold">Upload File</span>
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                    </label>
                    <button id="switchCam" class="p-4 bg-zinc-900 border border-white/5 rounded-2xl text-emerald-500 hover:bg-zinc-800 transition-all">
                        <i class="fa-solid fa-arrows-rotate"></i>
                    </button>
                </div>

                <!-- Guidance -->
                <div class="bg-zinc-900/50 border border-white/5 rounded-2xl p-6">
                    <h3 class="text-[10px] font-mono uppercase tracking-[0.2em] text-zinc-500 mb-4">Accuracy Tips</h3>
                    <ul class="space-y-3 text-sm text-zinc-400">
                        <li class="flex gap-3"><span class="text-emerald-500 font-mono">01</span><span>Keep paper flat on table</span></li>
                        <li class="flex gap-3"><span class="text-emerald-500 font-mono">02</span><span>Ensure plenty of top-down light</span></li>
                    </ul>
                </div>
            </section>

            <!-- Right Column: Results -->
            <section class="space-y-6">
                <div class="bg-zinc-900 rounded-[2rem] border border-white/5 overflow-hidden flex flex-col min-h-[500px] shadow-2xl">
                    <div class="p-6 border-b border-white/5 flex items-center justify-between bg-zinc-900/50">
                        <h2 class="font-bold text-lg flex items-center gap-2">
                            <i class="fa-solid fa-magnifying-glass-chart text-emerald-500"></i>
                            Analysis
                        </h2>
                        <div id="loadingStatus" class="hidden flex items-center gap-2 text-emerald-500 text-xs font-mono">
                            <div class="loader"></div>
                            <span>GRADING...</span>
                        </div>
                    </div>

                    <div id="resultsContainer" class="flex-1 p-6 overflow-y-auto">
                        <!-- Empty State -->
                        <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center py-20 opacity-40">
                            <i class="fa-solid fa-file-signature text-5xl mb-4"></i>
                            <p class="text-sm max-w-[200px]">Snap your worksheet to start grading</p>
                        </div>

                        <!-- Results View -->
                        <div id="analysisView" class="hidden space-y-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-zinc-800/50 p-5 rounded-3xl border border-white/5">
                                    <p class="text-[10px] font-mono text-zinc-500 uppercase mb-1">Checked</p>
                                    <p id="totalCount" class="text-3xl font-black">0</p>
                                </div>
                                <div class="bg-emerald-500/10 p-5 rounded-3xl border border-emerald-500/20">
                                    <p class="text-[10px] font-mono text-emerald-500 uppercase mb-1">Score</p>
                                    <p id="correctCount" class="text-3xl font-black text-emerald-400">0</p>
                                </div>
                            </div>
                            
                            <div class="space-y-3" id="resultsList"></div>
                            
                            <button onclick="resetApp()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-5 rounded-2xl transition-all shadow-xl shadow-emerald-500/10 active:scale-95">
                                START NEW CHECK
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- History Overlay -->
        <div id="historyLayer" class="hidden fixed inset-0 z-[60] bg-black/90 backdrop-blur-md p-6 overflow-y-auto">
            <div class="max-w-xl mx-auto space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-black">Past Checks</h2>
                    <button id="closeHistory" class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="historyItems" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <canvas id="captureCanvas" class="hidden"></canvas>

    <script>
        const apiKey = "";
        let stream = null;
        let useFront = false;
        let history = JSON.parse(localStorage.getItem('kumon_history') || '[]');

        const ui = {
            video: document.getElementById('videoStream'),
            captureBtn: document.getElementById('captureBtn'),
            resetBtn: document.getElementById('resetBtn'),
            switchBtn: document.getElementById('switchCam'),
            fileInput: document.getElementById('fileInput'),
            previewLayer: document.getElementById('previewLayer'),
            previewImg: document.getElementById('previewImage'),
            loadingStatus: document.getElementById('loadingStatus'),
            emptyState: document.getElementById('emptyState'),
            analysisView: document.getElementById('analysisView'),
            resultsList: document.getElementById('resultsList'),
            totalCount: document.getElementById('totalCount'),
            correctCount: document.getElementById('correctCount'),
            toggleHistory: document.getElementById('toggleHistory'),
            historyLayer: document.getElementById('historyLayer'),
            closeHistory: document.getElementById('closeHistory'),
            historyItems: document.getElementById('historyItems'),
            canvas: document.getElementById('captureCanvas')
        };

        // Start Camera
        async function initCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: useFront ? "user" : "environment", width: { ideal: 1280 } } 
                });
                ui.video.srcObject = stream;
            } catch (err) {
                console.error("Camera failed", err);
            }
        }

        // Capture Logic
        ui.captureBtn.onclick = () => {
            const ctx = ui.canvas.getContext('2d');
            ui.canvas.width = ui.video.videoWidth;
            ui.canvas.height = ui.video.videoHeight;
            ctx.drawImage(ui.video, 0, 0);
            const dataUrl = ui.canvas.toDataURL('image/jpeg', 0.8);
            showPreview(dataUrl);
        };

        function showPreview(url) {
            ui.previewImg.src = url;
            ui.previewLayer.classList.remove('hidden');
            processSheet(url);
        }

        function resetApp() {
            ui.previewLayer.classList.add('hidden');
            ui.analysisView.classList.add('hidden');
            ui.emptyState.classList.remove('hidden');
            ui.loadingStatus.classList.add('hidden');
            initCamera();
        }

        ui.resetBtn.onclick = resetApp;
        ui.switchBtn.onclick = () => { useFront = !useFront; initCamera(); };
        ui.fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => showPreview(ev.target.result);
            reader.readAsDataURL(e.target.files[0]);
        };

        // AI Logic
        async function processSheet(b64) {
            ui.loadingStatus.classList.remove('hidden');
            ui.emptyState.classList.add('hidden');
            
            const prompt = "Grade this math worksheet. Return JSON array: [{'q':'Problem','user':'Detected Answer','ok':true/false}]";
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const json = await res.json();
                const data = JSON.parse(json.candidates[0].content.parts[0].text);
                renderResults(data);
                saveHistory(data);
            } catch (err) {
                alert("AI error. Please ensure the image is bright and sharp.");
                resetApp();
            }
        }

        function renderResults(data) {
            ui.loadingStatus.classList.add('hidden');
            ui.analysisView.classList.remove('hidden');
            ui.resultsList.innerHTML = '';
            
            const ok = data.filter(d => d.ok).length;
            ui.totalCount.innerText = data.length;
            ui.correctCount.innerText = `${ok}/${data.length}`;
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl border flex items-center justify-between ${item.ok ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-rose-500/5 border-rose-500/20'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i class="fa-solid ${item.ok ? 'fa-circle-check text-emerald-500' : 'fa-circle-xmark text-rose-500'} text-xl"></i>
                        <div>
                            <p class="font-bold text-sm text-zinc-200">${item.q}</p>
                            <p class="text-[10px] text-zinc-500 font-mono">DETECTED: ${item.user}</p>
                        </div>
                    </div>
                `;
                ui.resultsList.appendChild(div);
            });
        }

        // History Management
        function saveHistory(data) {
            const entry = { date: new Date().toLocaleString(), score: `${data.filter(d => d.ok).length}/${data.length}` };
            history.unshift(entry);
            localStorage.setItem('kumon_history', JSON.stringify(history.slice(0, 10)));
        }

        ui.toggleHistory.onclick = () => {
            ui.historyItems.innerHTML = history.map(h => `
                <div class="bg-zinc-900 border border-white/5 p-4 rounded-2xl flex justify-between items-center">
                    <span class="text-xs font-mono text-zinc-400">${h.date}</span>
                    <span class="font-black text-emerald-400">${h.score}</span>
                </div>
            `).join('') || '<p class="text-center text-zinc-500">No history yet</p>';
            ui.historyLayer.classList.remove('hidden');
        };

        ui.closeHistory.onclick = () => ui.historyLayer.classList.add('hidden');

        window.onload = initCamera;
    </script>
</body>
</html>
