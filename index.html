<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUMON AI | Grading Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .loader { border: 2px solid rgba(16, 185, 129, 0.1); border-top: 2px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #videoFeed { transform: scaleX(-1); }
        #settingsModal { transition: opacity 0.2s ease-out; }
        #settingsModal.hidden { display: none; opacity: 0; }
        #settingsModal:not(.hidden) { display: flex; opacity: 1; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top Navigation -->
    <header class="sticky top-0 z-50 glass border-b border-white/5 px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i class="fa-solid fa-bolt text-black text-sm"></i>
            </div>
            <h1 class="font-extrabold tracking-tighter text-xl">KUMON<span class="text-emerald-500">AI</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="btnSettings" class="p-2 text-zinc-400 hover:text-white transition-colors relative group">
                <i class="fa-solid fa-gear text-lg"></i>
                <div id="keyMissingBadge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-black animate-pulse"></div>
            </button>
            <button id="btnHistory" class="p-2 text-zinc-400 hover:text-white transition-colors"><i class="fa-solid fa-clock-rotate-left"></i></button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left: Camera -->
        <div class="lg:col-span-7 space-y-6">
            <div class="relative aspect-[4/3] bg-zinc-900 rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                <div id="camView" class="h-full w-full relative">
                    <video id="videoFeed" autoplay playsinline muted class="w-full h-full object-cover brightness-110 contrast-125"></video>
                    <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                        <div class="w-4/5 h-4/5 border-2 border-dashed border-emerald-500/30 rounded-2xl relative">
                            <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-emerald-500 rounded-tl-md"></div>
                            <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-emerald-500 rounded-tr-md"></div>
                            <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-emerald-500 rounded-bl-md"></div>
                            <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-emerald-500 rounded-br-md"></div>
                        </div>
                    </div>
                    <div class="absolute bottom-6 left-0 right-0 flex justify-center">
                        <button id="snap" class="group relative flex items-center justify-center">
                            <div class="absolute w-20 h-20 bg-emerald-500/20 rounded-full animate-ping"></div>
                            <div class="w-16 h-16 bg-white rounded-full border-4 border-zinc-800 flex items-center justify-center group-hover:scale-110 transition-transform active:scale-90">
                                <i class="fa-solid fa-camera text-zinc-900 text-xl"></i>
                            </div>
                        </button>
                    </div>
                </div>

                <div id="reviewView" class="hidden absolute inset-0 bg-black">
                    <img id="takenPhoto" class="w-full h-full object-contain">
                    <div class="absolute top-4 right-4 flex gap-2">
                        <button id="cancel" class="glass px-4 py-2 rounded-full text-sm font-bold text-rose-400 hover:bg-rose-500/10"><i class="fa-solid fa-xmark mr-2"></i>Retake</button>
                    </div>
                </div>
            </div>

            <div class="flex gap-4">
                <button id="switch" class="flex-1 glass p-4 rounded-2xl text-sm font-bold hover:bg-white/5 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-camera-rotate text-emerald-500"></i> Flip Camera
                </button>
                <label class="flex-1 glass p-4 rounded-2xl text-sm font-bold hover:bg-white/5 transition-all flex items-center justify-center gap-3 cursor-pointer">
                    <i class="fa-solid fa-file-arrow-up text-emerald-500"></i> Upload
                    <input type="file" id="upload" class="hidden" accept="image/*">
                </label>
            </div>
        </div>

        <!-- Right: Results -->
        <div class="lg:col-span-5 space-y-6">
            <div class="glass rounded-3xl min-h-[500px] flex flex-col overflow-hidden">
                <div class="p-6 border-b border-white/5 flex items-center justify-between">
                    <h2 class="font-bold flex items-center gap-2">
                        <i class="fa-solid fa-microchip text-emerald-500"></i> AI Grading
                    </h2>
                    <div id="status" class="hidden flex items-center gap-3 text-emerald-400 text-xs font-mono">
                        <div class="loader"></div> GRADING...
                    </div>
                </div>

                <div id="resultContent" class="flex-1 p-6 overflow-y-auto max-h-[600px]">
                    <div id="empty" class="h-full flex flex-col items-center justify-center text-center opacity-30 py-20">
                        <i class="fa-solid fa-file-circle-question text-6xl mb-4"></i>
                        <p class="text-sm">Capture a worksheet to begin</p>
                    </div>

                    <div id="grades" class="hidden space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="glass p-5 rounded-2xl text-center">
                                <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Grade</p>
                                <p id="finalScore" class="text-4xl font-black text-emerald-500">-</p>
                            </div>
                            <div class="glass p-5 rounded-2xl text-center">
                                <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Accuracy</p>
                                <p id="accuracyCount" class="text-4xl font-black text-white">0/0</p>
                            </div>
                        </div>
                        <div id="breakdown" class="space-y-3"></div>
                        <button onclick="location.reload()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl">NEW SCAN</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-8 rounded-[2.5rem] space-y-6 border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-gear text-emerald-500"></i> Fix API Connection
                </h3>
                <button id="closeSettings" class="text-zinc-500 hover:text-white p-2"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div class="bg-emerald-500/10 border border-emerald-500/20 p-5 rounded-3xl space-y-3">
                <p class="text-[11px] text-zinc-300 leading-relaxed">
                    1. Go to <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-emerald-400 underline font-bold">Google AI Studio</a><br>
                    2. Click <b>"Create API key"</b><br>
                    3. Copy the key and paste it below.
                </p>
            </div>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-mono uppercase text-zinc-500 tracking-widest">Your API Key</label>
                    <div class="relative flex gap-2">
                        <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-4 text-emerald-400 focus:outline-none focus:border-emerald-500 text-sm font-mono">
                        <button id="toggleKeyVisibility" class="glass px-4 rounded-xl text-zinc-400"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>
                
                <div class="flex flex-col gap-2">
                    <button id="saveKey" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl hover:bg-emerald-400 transition-all text-sm">SAVE & CONNECT</button>
                    <button id="testKey" class="w-full py-3 glass text-white font-bold rounded-xl hover:bg-white/10 transition-all text-xs">TEST CONNECTION</button>
                </div>
            </div>
            
            <div id="keyStatusMsg" class="hidden p-3 rounded-xl text-center text-[11px] font-bold"></div>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const storageKey = 'KUMON_AI_KEY';
        const modelsToTry = [
            "gemini-1.5-flash",
            "gemini-1.5-pro",
            "gemini-2.0-flash-exp"
        ];
        
        const ui = {
            video: document.getElementById('videoFeed'),
            snap: document.getElementById('snap'),
            cancel: document.getElementById('cancel'),
            review: document.getElementById('reviewView'),
            photo: document.getElementById('takenPhoto'),
            status: document.getElementById('status'),
            empty: document.getElementById('empty'),
            grades: document.getElementById('grades'),
            breakdown: document.getElementById('breakdown'),
            finalScore: document.getElementById('finalScore'),
            accuracy: document.getElementById('accuracyCount'),
            canvas: document.getElementById('canvas'),
            settings: document.getElementById('settingsModal'),
            keyInput: document.getElementById('apiKeyInput'),
            keyBadge: document.getElementById('keyMissingBadge'),
            keyMsg: document.getElementById('keyStatusMsg')
        };

        function checkKey() {
            const key = localStorage.getItem(storageKey);
            ui.keyBadge.classList.toggle('hidden', !!key);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 } }
                });
                ui.video.srcObject = stream;
            } catch (err) { alert("Camera access denied."); }
        }

        ui.snap.onclick = () => {
            const ctx = ui.canvas.getContext('2d');
            ui.canvas.width = ui.video.videoWidth;
            ui.canvas.height = ui.video.videoHeight;
            ctx.drawImage(ui.video, 0, 0);
            const b64 = ui.canvas.toDataURL('image/jpeg', 0.8);
            ui.photo.src = b64;
            ui.review.classList.remove('hidden');
            analyze(b64.split(',')[1]);
        };

        async function analyze(cleanB64) {
            const key = localStorage.getItem(storageKey);
            if (!key) { ui.settings.classList.remove('hidden'); return; }

            ui.status.classList.remove('hidden');
            ui.empty.classList.add('hidden');
            
            const prompt = "Grade this Kumon math worksheet. Return ONLY JSON: { \"results\": [ { \"problem\": \"string\", \"user_answer\": \"string\", \"correct_answer\": \"string\", \"is_correct\": boolean } ], \"final_grade\": \"A-F\" }";

            // Attempting multiple models in case one is restricted
            for (let modelName of modelsToTry) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${key}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: cleanB64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                        showResults(parsed);
                        return;
                    }
                } catch (e) { console.warn(`Model ${modelName} failed, trying next...`); }
            }

            ui.status.classList.add('hidden');
            ui.empty.classList.remove('hidden');
            alert("Connection Error. Please check your API key in settings.");
            ui.settings.classList.remove('hidden');
        }

        function showResults(data) {
            ui.status.classList.add('hidden');
            ui.grades.classList.remove('hidden');
            ui.breakdown.innerHTML = '';
            const list = data.results || [];
            ui.accuracy.innerText = `${list.filter(x => x.is_correct).length}/${list.length}`;
            ui.finalScore.innerText = data.final_grade || "B";

            list.forEach(item => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl border flex justify-between items-center ${item.is_correct ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-rose-500/5 border-rose-500/20'}`;
                div.innerHTML = `<div><p class="text-xs font-bold">${item.problem}</p><p class="text-[10px] opacity-50">You: ${item.user_answer} | Correct: ${item.correct_answer}</p></div><i class="fa-solid ${item.is_correct ? 'fa-check text-emerald-500' : 'fa-xmark text-rose-500'}"></i>`;
                ui.breakdown.appendChild(div);
            });
        }

        // Settings events
        document.getElementById('btnSettings').onclick = () => ui.settings.classList.remove('hidden');
        document.getElementById('closeSettings').onclick = () => ui.settings.classList.add('hidden');
        document.getElementById('saveKey').onclick = () => {
            localStorage.setItem(storageKey, ui.keyInput.value.trim());
            checkKey();
            ui.settings.classList.add('hidden');
        };
        document.getElementById('toggleKeyVisibility').onclick = () => {
            ui.keyInput.type = ui.keyInput.type === 'password' ? 'text' : 'password';
        };
        
        document.getElementById('testKey').onclick = async () => {
            const key = ui.keyInput.value.trim();
            ui.keyMsg.classList.remove('hidden');
            ui.keyMsg.innerText = "Connecting...";
            ui.keyMsg.className = "p-3 rounded-xl text-center text-[11px] font-bold bg-zinc-500/10 text-zinc-400 block";
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
                });
                if(res.ok) {
                    ui.keyMsg.innerText = "Success! Key is working. ✨";
                    ui.keyMsg.className = "p-3 rounded-xl text-center text-[11px] font-bold bg-emerald-500/10 text-emerald-400 block";
                } else {
                    const errData = await res.json();
                    ui.keyMsg.innerText = "Error: " + (errData.error?.message || "Invalid Key");
                    ui.keyMsg.className = "p-3 rounded-xl text-center text-[11px] font-bold bg-rose-500/10 text-rose-500 block";
                }
            } catch(e) {
                ui.keyMsg.innerText = "Network Error. Check internet.";
                ui.keyMsg.className = "p-3 rounded-xl text-center text-[11px] font-bold bg-rose-500/10 text-rose-500 block";
            }
        };

        window.onload = () => { startCamera(); checkKey(); };
    </script>
</body>
</html>
