<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUMON AI | Grading Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .emerald-glow { box-shadow: 0 0 30px rgba(16, 185, 129, 0.15); }
        .loader { border: 2px solid rgba(16, 185, 129, 0.1); border-top: 2px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #videoFeed { transform: scaleX(-1); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top Navigation -->
    <header class="sticky top-0 z-50 glass border-b border-white/5 px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i class="fa-solid fa-bolt text-black text-sm"></i>
            </div>
            <h1 class="font-extrabold tracking-tighter text-xl">KUMON<span class="text-emerald-500">AI</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="btnSettings" class="p-2 text-zinc-400 hover:text-white transition-colors relative">
                <i class="fa-solid fa-gear"></i>
                <div id="keyMissingBadge" class="hidden absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full"></div>
            </button>
            <button id="btnHistory" class="p-2 text-zinc-400 hover:text-white transition-colors"><i class="fa-solid fa-clock-rotate-left"></i></button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left: Camera (7 Columns) -->
        <div class="lg:col-span-7 space-y-6">
            <div class="relative aspect-[4/3] bg-zinc-900 rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                <div id="camView" class="h-full w-full relative">
                    <video id="videoFeed" autoplay playsinline muted class="w-full h-full object-cover brightness-110 contrast-125"></video>
                    
                    <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                        <div class="w-4/5 h-4/5 border-2 border-dashed border-emerald-500/30 rounded-2xl relative">
                            <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-emerald-500 rounded-tl-md"></div>
                            <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-emerald-500 rounded-tr-md"></div>
                            <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-emerald-500 rounded-bl-md"></div>
                            <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-emerald-500 rounded-br-md"></div>
                        </div>
                    </div>

                    <div class="absolute bottom-6 left-0 right-0 flex justify-center">
                        <button id="snap" class="group relative flex items-center justify-center">
                            <div class="absolute w-20 h-20 bg-emerald-500/20 rounded-full animate-ping"></div>
                            <div class="w-16 h-16 bg-white rounded-full border-4 border-zinc-800 flex items-center justify-center group-hover:scale-110 transition-transform active:scale-90">
                                <i class="fa-solid fa-camera text-zinc-900 text-xl"></i>
                            </div>
                        </button>
                    </div>
                </div>

                <div id="reviewView" class="hidden absolute inset-0 bg-black">
                    <img id="takenPhoto" class="w-full h-full object-contain">
                    <div class="absolute top-4 right-4 flex gap-2">
                        <button id="cancel" class="glass px-4 py-2 rounded-full text-sm font-bold text-rose-400 hover:bg-rose-500/10"><i class="fa-solid fa-xmark mr-2"></i>Retake</button>
                    </div>
                </div>
            </div>

            <div class="flex gap-4">
                <button id="switch" class="flex-1 glass p-4 rounded-2xl text-sm font-bold hover:bg-white/5 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-camera-rotate text-emerald-500"></i> Flip Camera
                </button>
                <label class="flex-1 glass p-4 rounded-2xl text-sm font-bold hover:bg-white/5 transition-all flex items-center justify-center gap-3 cursor-pointer">
                    <i class="fa-solid fa-file-arrow-up text-emerald-500"></i> Upload File
                    <input type="file" id="upload" class="hidden" accept="image/*">
                </label>
            </div>
        </div>

        <!-- Right: Results -->
        <div class="lg:col-span-5 space-y-6">
            <div class="glass rounded-3xl min-h-[500px] flex flex-col overflow-hidden">
                <div class="p-6 border-b border-white/5 flex items-center justify-between">
                    <h2 class="font-bold flex items-center gap-2">
                        <i class="fa-solid fa-microchip text-emerald-500"></i> AI Grading
                    </h2>
                    <div id="status" class="hidden flex items-center gap-3 text-emerald-400 text-xs font-mono">
                        <div class="loader"></div> READING...
                    </div>
                </div>

                <div id="resultContent" class="flex-1 p-6 overflow-y-auto max-h-[600px]">
                    <div id="empty" class="h-full flex flex-col items-center justify-center text-center opacity-30 py-20">
                        <i class="fa-solid fa-file-circle-question text-6xl mb-4"></i>
                        <p class="text-sm">Align worksheet within the frame<br>and tap the camera button.</p>
                    </div>

                    <div id="grades" class="hidden space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="glass p-5 rounded-2xl text-center">
                                <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Grade</p>
                                <p id="finalScore" class="text-4xl font-black text-emerald-500">A</p>
                            </div>
                            <div class="glass p-5 rounded-2xl text-center">
                                <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Accuracy</p>
                                <p id="accuracyCount" class="text-4xl font-black text-white">0/0</p>
                            </div>
                        </div>
                        <div id="breakdown" class="space-y-3"></div>
                        <button onclick="location.reload()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl hover:bg-emerald-400 transition-all shadow-xl shadow-emerald-500/10">NEW SESSION</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-8 rounded-[2.5rem] space-y-6 border border-white/10">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">AI Configuration</h3>
                <button id="closeSettings" class="text-zinc-500 hover:text-white p-2"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <!-- Get Key CTA -->
            <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-2xl space-y-3">
                <p class="text-xs text-emerald-400 font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-circle-info"></i> No API Key yet?
                </p>
                <p class="text-[11px] text-zinc-400 leading-relaxed">You need a free Gemini API key from Google AI Studio to use the grading features.</p>
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="block w-full py-2 bg-emerald-500 text-black text-center text-xs font-black rounded-xl hover:bg-emerald-400 transition-all">
                    GET FREE API KEY <i class="fa-solid fa-arrow-up-right-from-square ml-1"></i>
                </a>
            </div>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-mono uppercase text-zinc-500 tracking-widest">Gemini API Key</label>
                    <div class="relative">
                        <input type="password" id="apiKeyInput" placeholder="Paste your key here..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-emerald-400 focus:outline-none focus:border-emerald-500 text-sm">
                        <button id="toggleKeyVisibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-400">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button id="saveKey" class="flex-1 py-3 bg-white text-black font-bold rounded-xl hover:bg-zinc-200 transition-all text-sm">Save Key</button>
                    <button id="testKey" class="px-4 py-3 glass text-white font-bold rounded-xl hover:bg-white/10 transition-all text-sm">
                        <i class="fa-solid fa-vial"></i>
                    </button>
                </div>
            </div>
            
            <p id="keyStatusMsg" class="text-center text-[10px] font-medium hidden"></p>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        let stream = null;
        let facingMode = "environment";
        const storageKey = 'KUMON_AI_KEY';
        
        const ui = {
            video: document.getElementById('videoFeed'),
            snap: document.getElementById('snap'),
            cancel: document.getElementById('cancel'),
            review: document.getElementById('reviewView'),
            photo: document.getElementById('takenPhoto'),
            status: document.getElementById('status'),
            empty: document.getElementById('empty'),
            grades: document.getElementById('grades'),
            breakdown: document.getElementById('breakdown'),
            finalScore: document.getElementById('finalScore'),
            accuracy: document.getElementById('accuracyCount'),
            canvas: document.getElementById('canvas'),
            settings: document.getElementById('settingsModal'),
            keyInput: document.getElementById('apiKeyInput'),
            keyBadge: document.getElementById('keyMissingBadge'),
            keyMsg: document.getElementById('keyStatusMsg')
        };

        // Initialize Key State
        function checkKeyPresence() {
            const key = localStorage.getItem(storageKey);
            if (!key) {
                ui.keyBadge.classList.remove('hidden');
            } else {
                ui.keyBadge.classList.add('hidden');
            }
        }

        async function startCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                ui.video.srcObject = stream;
            } catch (err) {
                console.error("Camera error:", err);
            }
        }

        ui.snap.onclick = () => {
            const ctx = ui.canvas.getContext('2d');
            ui.canvas.width = ui.video.videoWidth;
            ui.canvas.height = ui.video.videoHeight;
            ctx.drawImage(ui.video, 0, 0);
            const b64 = ui.canvas.toDataURL('image/jpeg', 0.85);
            ui.photo.src = b64;
            ui.review.classList.remove('hidden');
            analyze(b64);
        };

        ui.cancel.onclick = () => {
            ui.review.classList.add('hidden');
            ui.grades.classList.add('hidden');
            ui.empty.classList.remove('hidden');
        };

        document.getElementById('switch').onclick = () => {
            facingMode = facingMode === "user" ? "environment" : "user";
            startCamera();
        };

        async function analyze(b64Data) {
            const key = localStorage.getItem(storageKey) || "";
            if (!key) {
                ui.settings.classList.remove('hidden');
                ui.status.classList.add('hidden');
                return;
            }

            ui.status.classList.remove('hidden');
            ui.empty.classList.add('hidden');
            ui.grades.classList.add('hidden');

            const cleanB64 = b64Data.split(',')[1];
            const prompt = "Act as a Kumon instructor. Grade this math worksheet. Return a JSON array of objects: {problem: string, user_answer: string, correct_answer: string, is_correct: boolean}. Include a 'final_grade' (A-F) and 'summary' string.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: cleanB64 } }
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("API Error");
                const result = await response.json();
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                showResults(data);
            } catch (err) {
                console.error(err);
                alert("AI Analysis failed. Check your API key in Settings.");
                ui.status.classList.add('hidden');
                ui.empty.classList.remove('hidden');
            }
        }

        function showResults(data) {
            ui.status.classList.add('hidden');
            ui.grades.classList.remove('hidden');
            ui.breakdown.innerHTML = '';

            const items = Array.isArray(data) ? data : (data.results || []);
            const correctCount = items.filter(i => i.is_correct).length;
            
            ui.finalScore.innerText = data.final_grade || (items.length > 0 && correctCount/items.length > 0.8 ? "A" : "B");
            ui.accuracy.innerText = `${correctCount}/${items.length}`;

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border flex justify-between items-center transition-all ${item.is_correct ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-rose-500/5 border-rose-500/20'}`;
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i class="fa-solid ${item.is_correct ? 'fa-check text-emerald-500' : 'fa-xmark text-rose-500'}"></i>
                        <div>
                            <p class="text-xs font-bold text-zinc-300">${item.problem}</p>
                            <p class="text-[10px] text-zinc-500">User: ${item.user_answer} | Correct: ${item.correct_answer}</p>
                        </div>
                    </div>
                `;
                ui.breakdown.appendChild(card);
            });
        }

        // Settings Logic
        document.getElementById('btnSettings').onclick = () => {
            ui.keyInput.value = localStorage.getItem(storageKey) || "";
            ui.settings.classList.remove('hidden');
            ui.keyMsg.classList.add('hidden');
        };
        document.getElementById('closeSettings').onclick = () => ui.settings.classList.add('hidden');
        
        document.getElementById('saveKey').onclick = () => {
            localStorage.setItem(storageKey, ui.keyInput.value.trim());
            checkKeyPresence();
            ui.keyMsg.innerText = "Key saved successfully!";
            ui.keyMsg.className = "text-center text-[10px] font-medium text-emerald-400 block";
            setTimeout(() => ui.settings.classList.add('hidden'), 1000);
        };

        document.getElementById('testKey').onclick = async () => {
            const key = ui.keyInput.value.trim();
            if(!key) return;
            ui.keyMsg.innerText = "Testing...";
            ui.keyMsg.className = "text-center text-[10px] font-medium text-zinc-400 block";
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
                });
                if(res.ok) {
                    ui.keyMsg.innerText = "Connection Working! ✨";
                    ui.keyMsg.className = "text-center text-[10px] font-medium text-emerald-400 block";
                } else {
                    throw new Error();
                }
            } catch(e) {
                ui.keyMsg.innerText = "Invalid Key. Try again.";
                ui.keyMsg.className = "text-center text-[10px] font-medium text-rose-400 block";
            }
        };

        document.getElementById('toggleKeyVisibility').onclick = () => {
            const type = ui.keyInput.type === 'password' ? 'text' : 'password';
            ui.keyInput.type = type;
            const icon = type === 'password' ? 'fa-eye' : 'fa-eye-slash';
            document.getElementById('toggleKeyVisibility').innerHTML = `<i class="fa-solid ${icon}"></i>`;
        };

        window.onload = () => {
            startCamera();
            checkKeyPresence();
        };
    </script>
</body>
</html>
